<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Roxanne Controller</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem;
      gap: 1.5rem;
    }

    h1 {
      font-size: 1.8rem;
      color: #ff6b35;
      letter-spacing: 2px;
    }

    #status-bar {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      background: #16213e;
      padding: 0.6rem 1.2rem;
      border-radius: 999px;
      font-size: 0.85rem;
    }

    #status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #555;
      transition: background 0.3s;
    }
    #status-dot.connected { background: #00e676; }
    #status-dot.error { background: #ff1744; }

    .panel {
      background: #16213e;
      border-radius: 12px;
      padding: 1.5rem;
      width: 100%;
      max-width: 480px;
    }

    .panel h2 {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #888;
      margin-bottom: 1rem;
    }

    .motor-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.75rem;
    }

    .motor-label {
      width: 60px;
      font-size: 0.85rem;
      color: #aaa;
    }

    .motor-indicator {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #333;
      transition: background 0.2s;
      flex-shrink: 0;
    }
    .motor-indicator.active { background: #ff6b35; }

    button {
      padding: 0.5rem 1rem;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      transition: opacity 0.15s, transform 0.1s;
    }
    button:active { transform: scale(0.96); }
    button:disabled { opacity: 0.3; cursor: not-allowed; }

    .btn-cw  { background: #ff6b35; color: #fff; }
    .btn-ccw { background: #0f3460; color: #fff; border: 1px solid #ff6b35; }
    .btn-stop-single { background: #333; color: #ff1744; border: 1px solid #ff1744; }

    .stop-all-btn {
      width: 100%;
      padding: 0.85rem;
      background: #ff1744;
      color: #fff;
      font-size: 1rem;
      border-radius: 8px;
      letter-spacing: 1px;
    }

    .presets {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 0.75rem;
    }

    .btn-preset {
      background: #0f3460;
      color: #fff;
      border: 1px solid #ff6b35;
      padding: 0.75rem;
      border-radius: 8px;
      font-size: 0.85rem;
    }

    #log {
      width: 100%;
      max-width: 480px;
      height: 160px;
      background: #0d0d1a;
      border-radius: 8px;
      padding: 0.75rem;
      font-family: monospace;
      font-size: 0.78rem;
      overflow-y: auto;
      color: #aaffaa;
      border: 1px solid #222;
    }

    .log-entry { margin-bottom: 2px; }
    .log-entry.sent { color: #ff6b35; }
    .log-entry.recv { color: #aaffaa; }
    .log-entry.sys  { color: #888; }
  </style>
</head>
<body>

  <h1>🦾 ROXANNE</h1>

  <div id="status-bar">
    <div id="status-dot"></div>
    <span id="status-text">Connecting to ws://192.168.4.1/ws...</span>
  </div>

  <div class="panel">
    <h2>Motor Control</h2>

    <div class="motor-row">
      <span class="motor-label">Motor 0</span>
      <div class="motor-indicator" id="ind-0"></div>
      <button class="btn-cw"  onclick="startMotor(0,'CW')">▶ CW</button>
      <button class="btn-ccw" onclick="startMotor(0,'CCW')">◀ CCW</button>
      <button class="btn-stop-single" onclick="stopAll()">■</button>
    </div>

    <div class="motor-row">
      <span class="motor-label">Motor 1</span>
      <div class="motor-indicator" id="ind-1"></div>
      <button class="btn-cw"  onclick="startMotor(1,'CW')">▶ CW</button>
      <button class="btn-ccw" onclick="startMotor(1,'CCW')">◀ CCW</button>
      <button class="btn-stop-single" onclick="stopAll()">■</button>
    </div>

    <div class="motor-row">
      <span class="motor-label">Motor 2</span>
      <div class="motor-indicator" id="ind-2"></div>
      <button class="btn-cw"  onclick="startMotor(2,'CW')">▶ CW</button>
      <button class="btn-ccw" onclick="startMotor(2,'CCW')">◀ CCW</button>
      <button class="btn-stop-single" onclick="stopAll()">■</button>
    </div>
  </div>

  <div class="panel">
    <h2>Presets</h2>
    <div class="presets">
      <button class="btn-preset" onclick="openHand()">✋ Open</button>
      <button class="btn-preset" onclick="closeHand()">✊ Close</button>
      <button class="btn-preset" onclick="sendCmd('STATUS')">📊 Status</button>
    </div>
  </div>

  <button class="stop-all-btn" onclick="stopAll()">⬛ STOP ALL</button>

  <div id="log"></div>

<script>
  const WS_URL = 'ws://192.168.4.1/ws';
  let ws = null;
  let motorStates = [false, false, false];

  function log(msg, type = 'sys') {
    const el = document.getElementById('log');
    const entry = document.createElement('div');
    entry.className = 'log-entry ' + type;
    entry.textContent = new Date().toLocaleTimeString() + ' ' + msg;
    el.appendChild(entry);
    el.scrollTop = el.scrollHeight;
  }

  function setStatus(connected, text) {
    const dot = document.getElementById('status-dot');
    const txt = document.getElementById('status-text');
    dot.className = connected ? 'connected' : 'error';
    txt.textContent = text;
  }

  function updateIndicator(id, active) {
    const ind = document.getElementById('ind-' + id);
    if (ind) ind.className = 'motor-indicator' + (active ? ' active' : '');
    motorStates[id] = active;
  }

  function connect() {
    log('Connecting to ' + WS_URL, 'sys');
    ws = new WebSocket(WS_URL);

    ws.onopen = () => {
      setStatus(true, 'Connected to Roxanne');
      log('WebSocket connected', 'sys');
    };

    ws.onclose = () => {
      setStatus(false, 'Disconnected — retrying in 3s...');
      log('WebSocket disconnected', 'sys');
      for (let i = 0; i < 3; i++) updateIndicator(i, false);
      setTimeout(connect, 3000);
    };

    ws.onerror = () => {
      setStatus(false, 'Connection error');
      log('WebSocket error', 'sys');
    };

    ws.onmessage = (e) => {
      log('← ' + e.data, 'recv');
      // Parse STATUS responses to update indicators
      const match = e.data.match(/motor (\d) active=(\d)/);
      if (match) updateIndicator(parseInt(match[1]), match[2] === '1');
      if (e.data.startsWith('OK motor=')) {
        const m = e.data.match(/motor=(\d)/);
        if (m) updateIndicator(parseInt(m[1]), true);
      }
      if (e.data === 'OK:STOP') {
        for (let i = 0; i < 3; i++) updateIndicator(i, false);
      }
    };
  }

  function sendCmd(cmd) {
    if (!ws || ws.readyState !== WebSocket.OPEN) {
      log('Not connected', 'sys');
      return;
    }
    ws.send(cmd);
    log('→ ' + cmd, 'sent');
  }

  function startMotor(id, dir) {
    sendCmd('START:' + id + ':' + dir);
  }

  function stopAll() {
    sendCmd('STOP');
  }

  function openHand() {
    sendCmd('START:0:CW');
    sendCmd('START:1:CW');
    sendCmd('START:2:CW');
  }

  function closeHand() {
    sendCmd('START:0:CCW');
    sendCmd('START:1:CCW');
    sendCmd('START:2:CCW');
  }

  connect();
</script>
</body>
</html>
