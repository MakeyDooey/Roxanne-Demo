<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Motor Console</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --panel: #13161e;
    --border: #1e2330;
    --accent: #00e5ff;
    --accent2: #ff3d71;
    --green: #00e676;
    --yellow: #ffd740;
    --text: #c8d0e0;
    --dim: #4a5568;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    font-family: 'Rajdhani', sans-serif;
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px;
    background-image:
      radial-gradient(ellipse at 20% 0%, rgba(0,229,255,0.04) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 100%, rgba(123,47,255,0.04) 0%, transparent 60%);
  }
  .header {
    width: 100%; max-width: 960px;
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 28px; padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  .logo  { font-family: 'Share Tech Mono', monospace; font-size: 11px; color: var(--dim); letter-spacing: 3px; text-transform: uppercase; }
  .title { font-size: 22px; font-weight: 700; letter-spacing: 4px; text-transform: uppercase; color: #fff; }
  .title span { color: var(--accent); }

  .conn-bar {
    width: 100%; max-width: 960px;
    background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
    padding: 12px 20px; display: flex; align-items: center; gap: 12px; margin-bottom: 16px; flex-wrap: wrap;
  }
  .conn-input {
    font-family: 'Share Tech Mono', monospace; font-size: 12px;
    background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 4px;
    color: var(--text); padding: 7px 12px; width: 220px; outline: none; letter-spacing: 1px;
  }
  .conn-input:focus { border-color: var(--accent); }
  .conn-btn {
    font-family: 'Share Tech Mono', monospace; font-size: 12px; letter-spacing: 2px;
    padding: 8px 20px; border: 1px solid var(--dim); border-radius: 4px;
    background: transparent; color: var(--text); cursor: pointer; transition: all 0.2s; text-transform: uppercase;
  }
  .conn-btn:hover { border-color: var(--accent); color: var(--accent); }
  .conn-btn.connected { border-color: var(--green); color: var(--green); background: rgba(0,230,118,0.07); }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--dim); transition: all 0.3s; flex-shrink: 0; }
  .status-dot.on { background: var(--green); box-shadow: 0 0 8px var(--green); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
  .status-text { font-family: 'Share Tech Mono', monospace; font-size: 11px; color: var(--dim); flex: 1; min-width: 160px; }
  .status-text.on { color: var(--green); }
  .log-toggle {
    font-family: 'Share Tech Mono', monospace; font-size: 10px; color: var(--dim);
    cursor: pointer; border: 1px solid var(--border); padding: 4px 10px; border-radius: 3px;
    transition: all 0.2s; background: transparent;
  }
  .log-toggle:hover { color: var(--accent); border-color: var(--accent); }

  .motors-grid {
    width: 100%; max-width: 960px;
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 16px;
  }
  .motor-card {
    background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
    padding: 18px 16px; display: flex; flex-direction: column; gap: 11px;
    position: relative; overflow: hidden; transition: border-color 0.3s;
  }
  .motor-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: var(--motor-color); opacity: 0.4; transition: opacity 0.3s;
  }
  .motor-card.active { border-color: var(--motor-color); }
  .motor-card.active::before { opacity: 1; }

  .motor-header { display: flex; align-items: center; justify-content: space-between; }
  .motor-name  { font-size: 13px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: var(--motor-color); }
  .motor-badge { font-family: 'Share Tech Mono', monospace; font-size: 9px; color: var(--dim); border: 1px solid var(--border); padding: 2px 6px; border-radius: 3px; }

  .motor-viz { display: flex; align-items: center; justify-content: center; height: 56px; }
  .rotor {
    width: 44px; height: 44px; border: 2px solid var(--border);
    border-radius: 50%; position: relative; transition: border-color 0.3s;
  }
  .rotor.cw  { animation: spinCW  var(--spin-duration, 0.6s) linear infinite; border-color: var(--motor-color); }
  .rotor.ccw { animation: spinCCW var(--spin-duration, 0.6s) linear infinite; border-color: var(--motor-color); }
  @keyframes spinCW  { from{transform:rotate(0deg)}   to{transform:rotate(360deg)}  }
  @keyframes spinCCW { from{transform:rotate(0deg)}   to{transform:rotate(-360deg)} }
  .rotor::after {
    content: ''; position: absolute; top: 4px; left: 50%; transform: translateX(-50%);
    width: 5px; height: 5px; background: var(--motor-color); border-radius: 50%;
  }
  .rotor-center {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    width: 9px; height: 9px; background: var(--motor-color); border-radius: 50%; opacity: 0.4;
  }

  .motor-status {
    font-family: 'Share Tech Mono', monospace; font-size: 10px; color: var(--dim);
    text-align: center; letter-spacing: 1px; padding: 5px;
    border: 1px solid var(--border); border-radius: 4px; transition: all 0.3s;
  }
  .motor-status.running {
    color: var(--motor-color); border-color: var(--motor-color);
    background: color-mix(in srgb, var(--motor-color) 8%, transparent);
  }

  /* ── Speed slider ── */
  .speed-row { display: flex; flex-direction: column; gap: 5px; }
  .speed-label-row { display: flex; justify-content: space-between; align-items: center; }
  .speed-label { font-family: 'Share Tech Mono', monospace; font-size: 9px; color: var(--dim); letter-spacing: 1px; }
  .speed-value { font-family: 'Share Tech Mono', monospace; font-size: 10px; color: var(--motor-color); letter-spacing: 1px; }
  .speed-slider {
    -webkit-appearance: none; appearance: none;
    width: 100%; height: 3px; border-radius: 2px; outline: none; cursor: pointer;
    background: linear-gradient(to right, var(--motor-color) var(--pct, 50%), var(--border) var(--pct, 50%));
  }
  .speed-slider::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 13px; height: 13px; border-radius: 50%;
    background: var(--motor-color);
    box-shadow: 0 0 6px color-mix(in srgb, var(--motor-color) 60%, transparent);
    cursor: pointer; transition: transform 0.1s;
  }
  .speed-slider::-webkit-slider-thumb:hover { transform: scale(1.3); }
  .speed-slider::-moz-range-thumb {
    width: 13px; height: 13px; border-radius: 50%; border: none;
    background: var(--motor-color); cursor: pointer;
  }
  .speed-ticks {
    display: flex; justify-content: space-between;
    font-family: 'Share Tech Mono', monospace; font-size: 8px; color: var(--dim); padding: 0 1px;
  }

  /* calibration note under slider */
  .calib-note {
    font-family: 'Share Tech Mono', monospace; font-size: 8px; color: var(--dim);
    text-align: right; opacity: 0.6;
  }

  .dir-toggle-row { display: flex; align-items: center; gap: 8px; }
  .dir-toggle-label { font-family: 'Share Tech Mono', monospace; font-size: 9px; color: var(--dim); letter-spacing: 1px; white-space: nowrap; }
  .dir-toggle { flex: 1; display: flex; border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
  .dir-opt {
    flex: 1; padding: 5px 4px; text-align: center;
    font-family: 'Share Tech Mono', monospace; font-size: 9px; letter-spacing: 1px;
    cursor: pointer; transition: all 0.2s; color: var(--dim); background: transparent;
    border: none; text-transform: uppercase;
  }
  .dir-opt:first-child { border-right: 1px solid var(--border); }
  .dir-opt.selected { background: color-mix(in srgb, var(--motor-color) 20%, transparent); color: var(--motor-color); }

  .motor-controls { display: flex; flex-direction: column; gap: 7px; }
  .run-btn {
    width: 100%; padding: 11px 6px; border: 1px solid var(--border); border-radius: 5px;
    background: rgba(255,255,255,0.02); color: var(--text);
    font-family: 'Rajdhani', sans-serif; font-size: 13px; font-weight: 600;
    letter-spacing: 2px; cursor: pointer; transition: all 0.15s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    text-transform: uppercase; user-select: none;
  }
  .run-btn:hover { background: rgba(255,255,255,0.06); border-color: var(--motor-color); color: #fff; }
  .run-btn.held {
    background: color-mix(in srgb, var(--motor-color) 15%, transparent);
    border-color: var(--motor-color); color: var(--motor-color);
    box-shadow: 0 0 14px color-mix(in srgb, var(--motor-color) 20%, transparent);
  }
  .kbd {
    font-family: 'Share Tech Mono', monospace; font-size: 10px;
    background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
    border-radius: 3px; padding: 1px 6px; color: var(--dim);
  }
  .run-btn.held .kbd { color: var(--motor-color); border-color: var(--motor-color); }
  .stop-btn {
    width: 100%; padding: 7px; border: 1px solid rgba(255,61,113,0.3); border-radius: 5px;
    background: transparent; color: var(--dim); font-family: 'Share Tech Mono', monospace;
    font-size: 10px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: all 0.2s;
  }
  .stop-btn:hover { border-color: var(--accent2); color: var(--accent2); background: rgba(255,61,113,0.07); }

  .log-panel { width: 100%; max-width: 960px; background: var(--panel); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; display: none; }
  .log-panel.visible { display: block; }
  .log-header { padding: 8px 16px; border-bottom: 1px solid var(--border); font-family: 'Share Tech Mono', monospace; font-size: 10px; color: var(--dim); letter-spacing: 2px; display: flex; justify-content: space-between; }
  .log-clear { cursor: pointer; } .log-clear:hover { color: var(--accent2); }
  #log { font-family: 'Share Tech Mono', monospace; font-size: 11px; padding: 12px 16px; height: 160px; overflow-y: auto; display: flex; flex-direction: column; gap: 3px; }
  .log-entry      { color: var(--dim); }
  .log-entry.tx   { color: var(--accent); }
  .log-entry.rx   { color: var(--green); }
  .log-entry.err  { color: var(--accent2); }
  .log-entry.info { color: var(--yellow); }

  .note { font-family: 'Share Tech Mono', monospace; font-size: 10px; color: var(--dim); margin-top: 12px; text-align: center; letter-spacing: 1px; }

  @media (max-width: 600px) { .motors-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<div class="header">
  <div class="logo">ESP32-S3 // TMC2209</div>
  <div class="title">MOTOR <span>CONSOLE</span></div>
  <div class="logo">WiFi WS</div>
</div>

<div class="conn-bar">
  <input class="conn-input" id="wsUrl" type="text" value="ws://192.168.4.1:81" placeholder="ws://192.168.4.1:81" />
  <button class="conn-btn" id="connBtn" onclick="toggleConnection()">Connect</button>
  <div class="status-dot" id="statusDot"></div>
  <div class="status-text" id="statusText">Not connected — join MotorConsole WiFi first</div>
  <button class="log-toggle" onclick="toggleLog()">LOG</button>
</div>

<div class="motors-grid" id="motorGrid"></div>

<div class="log-panel" id="logPanel">
  <div class="log-header">
    <span>WEBSOCKET LOG</span>
    <span class="log-clear" onclick="clearLog()">[ CLEAR ]</span>
  </div>
  <div id="log"></div>
</div>

<p class="note">1. Join WiFi: <strong>MotorConsole</strong> / pass: <strong>12345678</strong> &nbsp;|&nbsp; 2. Click Connect &nbsp;|&nbsp; Hold button or key (1/2/3) to run.</p>

<script>
  // ── Calibration ───────────────────────────────────────────────
  // Measured matching-speed delays: M1=2780µs, M2=576µs, M3=390µs
  // These are the delays that produce equal physical speed on each motor.
  // The slider represents a shared "speed level" (0=slowest, 100=fastest).
  // At any given slider position the delay sent to each motor is scaled
  // by its own ratio so all three turn at the same physical speed.

  const CALIB = [2780, 576, 390];   // µs at calibration point (= equal speed)
  const CALIB_SLIDER = 50;          // slider position the calibration point maps to

  // Each motor's delay range is derived from its calibration value.
  // We keep the ratio constant across the full range.
  // Slider 0  → multiply calib by RANGE_FACTOR  (slowest)
  // Slider 100→ divide  calib by RANGE_FACTOR   (fastest)
  const RANGE_FACTOR = 6;  // gives ~6× speed range each side of calib

  // Convert a 0–100 slider value to µs delay for motor idx
  function sliderToDelay(idx, v) {
    // t goes from +1 (slowest) to -1 (fastest), 0 at calibration point
    const t = 1 - (v / 50);  // v=0 → t=1, v=50 → t=0, v=100 → t=-1
    // exponential mapping: delay = calib * RANGE_FACTOR^t
    const delay = Math.round(CALIB[idx] * Math.pow(RANGE_FACTOR, t));
    // clamp to hardware-safe range
    return Math.max(200, Math.min(20000, delay));
  }

  const MOTORS = [
    { name: 'Motor 1', color: '#00b4d8', badge: '1/8 µSTEP',  key: '1' },
    { name: 'Motor 2', color: '#7b2fff', badge: '1/32 µSTEP', key: '2' },
    { name: 'Motor 3', color: '#ff6b35', badge: '1/32 µSTEP', key: '3' },
  ];

  let ws = null;
  let activeMotor = -1, activeDir = '';
  let keyHeld = {};
  let logVisible = false;
  const dirFlipped  = [false, false, false];
  const sliderVals  = [CALIB_SLIDER, CALIB_SLIDER, CALIB_SLIDER];
  const speedTimers = [null, null, null];

  // ── Build motor cards ─────────────────────────────────────────
  const grid = document.getElementById('motorGrid');
  MOTORS.forEach((m, i) => {
    const initDelay = sliderToDelay(i, CALIB_SLIDER);
    const card = document.createElement('div');
    card.className = 'motor-card';
    card.id = `card${i}`;
    card.style.setProperty('--motor-color', m.color);
    card.innerHTML = `
      <div class="motor-header">
        <div class="motor-name">${m.name}</div>
        <div class="motor-badge">${m.badge}</div>
      </div>
      <div class="motor-viz">
        <div class="rotor" id="rotor${i}"><div class="rotor-center"></div></div>
      </div>
      <div class="motor-status" id="status${i}">IDLE</div>

      <div class="speed-row">
        <div class="speed-label-row">
          <span class="speed-label">SPEED</span>
          <span class="speed-value" id="speedval${i}">${initDelay}µs</span>
        </div>
        <input type="range" class="speed-slider" id="slider${i}"
          min="0" max="100" value="${CALIB_SLIDER}"
          style="--pct:${CALIB_SLIDER}%"
          oninput="onSlider(${i}, this.value)" />
        <div class="speed-ticks"><span>SLOW</span><span>FAST</span></div>
        <div class="calib-note">▲ mid = calibrated match point</div>
      </div>

      <div class="dir-toggle-row">
        <span class="dir-toggle-label">WIRING</span>
        <div class="dir-toggle">
          <button class="dir-opt selected" id="tognorm${i}" onclick="setFlip(${i}, false)">NORMAL</button>
          <button class="dir-opt"          id="togflip${i}" onclick="setFlip(${i}, true)">FLIP</button>
        </div>
      </div>
      <div class="motor-controls">
        <button class="run-btn" id="btn${i}"
          onmousedown="startMotor(${i},'CW')"  onmouseup="stopMotor()"
          ontouchstart="startMotor(${i},'CW')" ontouchend="stopMotor()">
          ▶ RUN CW <span class="kbd">${m.key}</span>
        </button>
        <button class="stop-btn" onclick="stopMotor()">■ STOP</button>
      </div>
    `;
    grid.appendChild(card);
  });

  // ── Slider handler ────────────────────────────────────────────
  function onSlider(idx, rawVal) {
    const v = parseInt(rawVal);
    sliderVals[idx] = v;
    const delay = sliderToDelay(idx, v);

    document.getElementById(`slider${idx}`).style.setProperty('--pct', v + '%');
    document.getElementById(`speedval${idx}`).textContent = delay + 'µs';

    if (activeMotor === idx) {
      const spinMs = Math.max(80, delay / 1000 * 20);
      document.getElementById(`rotor${idx}`).style.setProperty('--spin-duration', spinMs + 'ms');
    }

    clearTimeout(speedTimers[idx]);
    speedTimers[idx] = setTimeout(() => {
      sendCmd(`SPEED:${idx}:${delay}`);
    }, 50);
  }

  // ── Direction flip ────────────────────────────────────────────
  function setFlip(idx, flipped) {
    dirFlipped[idx] = flipped;
    document.getElementById(`tognorm${idx}`).classList.toggle('selected', !flipped);
    document.getElementById(`togflip${idx}`).classList.toggle('selected',  flipped);
    logEntry(`Motor ${idx+1} wiring ${flipped ? 'FLIPPED' : 'NORMAL'}`, 'info');
    if (activeMotor === idx) startMotor(idx, activeDir);
  }

  function resolveDir(idx, dir) {
    if (!dirFlipped[idx]) return dir;
    return dir === 'CW' ? 'CCW' : 'CW';
  }

  // ── WebSocket ─────────────────────────────────────────────────
  function toggleConnection() {
    if (ws && ws.readyState === WebSocket.OPEN) { disconnect(); } else { connect(); }
  }

  function connect() {
    const url = document.getElementById('wsUrl').value.trim();
    logEntry(`Connecting to ${url}…`, 'info');
    try { ws = new WebSocket(url); } catch(e) { logEntry('Invalid URL: ' + e.message, 'err'); return; }
    ws.onopen  = () => { logEntry('WebSocket connected.', 'info'); setConnected(true); };
    ws.onclose = () => {
      logEntry('WebSocket closed.', 'info'); setConnected(false);
      activeMotor = -1; activeDir = ''; updateUI(); ws = null;
    };
    ws.onerror  = () => { logEntry('WebSocket error — is the ESP32 on and reachable?', 'err'); };
    ws.onmessage = (e) => { logEntry('← ' + e.data, 'rx'); };
  }

  function disconnect() {
    if (ws) { ws.close(); ws = null; }
    activeMotor = -1; activeDir = ''; updateUI(); setConnected(false);
  }

  function setConnected(on) {
    document.getElementById('connBtn').textContent = on ? 'Disconnect' : 'Connect';
    document.getElementById('connBtn').classList.toggle('connected', on);
    document.getElementById('statusDot').classList.toggle('on', on);
    const st = document.getElementById('statusText');
    st.textContent = on ? 'Connected — ESP32-S3 WebSocket' : 'Not connected — join MotorConsole WiFi first';
    st.classList.toggle('on', on);
  }

  function sendCmd(cmd) {
    if (!ws || ws.readyState !== WebSocket.OPEN) { logEntry('Not connected.', 'err'); return; }
    ws.send(cmd);
    logEntry('→ ' + cmd, 'tx');
  }

  // ── Motor control ─────────────────────────────────────────────
  function startMotor(idx, requestedDir) {
    if (activeMotor !== -1 && activeMotor !== idx) sendCmd('STOP');
    activeMotor = idx;
    activeDir   = requestedDir;
    const actualDir = resolveDir(idx, requestedDir);
    sendCmd(`START:${idx}:${actualDir}`);
    updateUI();
  }

  function stopMotor() {
    if (activeMotor === -1) return;
    sendCmd('STOP');
    activeMotor = -1; activeDir = '';
    updateUI();
  }

  function updateUI() {
    MOTORS.forEach((m, i) => {
      const isActive = activeMotor === i;
      document.getElementById(`card${i}`).classList.toggle('active', isActive);
      const rotor = document.getElementById(`rotor${i}`);
      rotor.className = 'rotor';
      if (isActive) {
        const actualDir = resolveDir(i, activeDir);
        rotor.classList.add(actualDir === 'CW' ? 'cw' : 'ccw');
        const delay = sliderToDelay(i, sliderVals[i]);
        const spinMs = Math.max(80, delay / 1000 * 20);
        rotor.style.setProperty('--spin-duration', spinMs + 'ms');
      }
      document.getElementById(`btn${i}`).classList.toggle('held', isActive);
      const s = document.getElementById(`status${i}`);
      if (isActive) {
        const actualDir = resolveDir(i, activeDir);
        s.textContent = actualDir === 'CW' ? '▶ CLOCKWISE' : '◀ COUNTER-CW';
        s.className = 'motor-status running';
      } else {
        s.textContent = 'IDLE';
        s.className = 'motor-status';
      }
    });
  }

  // ── Keyboard ──────────────────────────────────────────────────
  const KEY_MAP = { '1': 0, '2': 1, '3': 2 };
  document.addEventListener('keydown', e => {
    const k = e.key;
    if (KEY_MAP[k] !== undefined && !keyHeld[k]) { keyHeld[k] = true; startMotor(KEY_MAP[k], 'CW'); }
  });
  document.addEventListener('keyup', e => {
    const k = e.key;
    if (KEY_MAP[k] !== undefined) { delete keyHeld[k]; stopMotor(); }
  });

  // ── Log ───────────────────────────────────────────────────────
  function toggleLog() {
    logVisible = !logVisible;
    document.getElementById('logPanel').classList.toggle('visible', logVisible);
  }
  function logEntry(msg, type = '') {
    const log = document.getElementById('log');
    const el  = document.createElement('div');
    el.className = 'log-entry ' + type;
    el.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
    log.appendChild(el);
    log.scrollTop = log.scrollHeight;
  }
  function clearLog() { document.getElementById('log').innerHTML = ''; }

  logEntry('Motor Console — calibrated speed mode.', 'info');
  logEntry('Sliders at 50% = equal physical speed on all motors.', 'info');
  logEntry('Join WiFi "MotorConsole" then click Connect.', 'info');
</script>
</body>
</html>
